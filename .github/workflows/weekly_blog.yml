name: Weekly Dental Blog Bot

on:
  schedule:
    - cron: '0 7 * * 1'  # 7:00 AM UTC every Monday (approx 9:00 AM/10:00 AM Greece)
  workflow_dispatch:     # Allows manual triggering from the GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Check out the whole repo so we can push back changes
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        working-directory: bot
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Dental Blog Bot
        working-directory: bot
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # The bot is in /bot, so it looks "up" one level for the website root
          WEBSITE_PATH: ".." 
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated: New weekly dental blog post" || echo "No changes to commit"
          git push
